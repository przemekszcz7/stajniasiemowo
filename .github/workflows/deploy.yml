# Simple, robust GitHub Actions workflow to build and deploy the static React + Vite site.
# This workflow builds the site and pushes it to the 'gh-pages' branch,
# which is the most foolproof deployment method and avoids API permission issues.

name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow pushing to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Linter / Type Check
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          # If your repository is hosted at a subpath (e.g., https://<username>.github.io/<repo-name>),
          # you can specify VITE_BASE_PATH if your config utilizes it.
          VITE_BASE_PATH: './'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

